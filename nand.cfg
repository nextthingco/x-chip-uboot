CONFIG_CMD_MTDPARTS=y
CONFIG_DM_MTD=y
CONFIG_MTDIDS_DEFAULT="nand0=nand0"
CONFIG_MTDPARTS_DEFAULT="nand0:0x400000(SPL),0x400000(SPL.backup),0x400000(U-Boot),0x400000(U-Boot.backup),-(rootfs)slc"
CONFIG_MTD_RAW_NAND=y
CONFIG_MTD=y
CONFIG_NAND_SUNXI_SPL_ECC_SIZE=512
CONFIG_SYS_NAND_BLOCK_SIZE=0x400000
CONFIG_SYS_NAND_OOBSIZE=0x680
CONFIG_SYS_NAND_PAGE_SIZE=0x4000
CONFIG_SYS_NAND_U_BOOT_OFFS_REDUND=0xc00000
CONFIG_SYS_NAND_USE_FLASH_BBT=y
CONFIG_UBI_SILENCE_MSG=y

# Boot order: FEL script (install/recovery) -> NAND ubifs rootfs (sourcing
# /boot/boot.scr generated by the rootfs build) -> distro fallback. Stays
# version-agnostic; the kernel paths + SLC/ubi bootargs live in boot.scr.
CONFIG_BOOTCOMMAND="run bootcmd_fel; if ubi part rootfs && ubifsmount ubi0:rootfs && ubifsload ${scriptaddr} /boot/boot.scr; then source ${scriptaddr}; fi; run distro_bootcmd"
